<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img"
     aria-label="Solidity Style Guide — consistent, safe, gas-aware Solidity"
     font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <title>Solidity Style Guide</title>
  <desc>Solidity Style Guide hero banner with a Solidity diamond mark and a terminal card showing a clean Solidity snippet.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0A0F1F"/>
      <stop offset="55%" stop-color="#0C1530"/>
      <stop offset="100%" stop-color="#0A0818"/>
    </linearGradient>

    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>

    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ECF1FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="70%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#dots)"/>
  <rect width="1280" height="420" fill="url(#vignette)"/>

  <!-- Eyebrow -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.5s" fill="freeze"/>
    <rect x="60" y="50" width="8" height="8" rx="2" fill="url(#stroke)"/>
    <text x="78" y="58" font-size="13" letter-spacing="3" fill="#A5B4FC" font-weight="600">SOLIDITY · 0.8.34 · FOUNDRY</text>
  </g>

  <!-- Title -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.25s" dur="0.5s" fill="freeze"/>
    <text x="60" y="100" font-size="54" font-weight="800" letter-spacing="-1.2" fill="url(#text)">Solidity Style Guide</text>
  </g>

  <!-- Terminal card -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.45s" dur="0.6s" fill="freeze"/>
    <rect x="60" y="114" width="620" height="248" rx="14" fill="#000" opacity="0.35"/>
    <rect x="60" y="112" width="620" height="248" rx="14" fill="#0E1530" stroke="#1F2A4A" stroke-width="1"/>
    <rect x="60" y="112" width="620" height="2" rx="1" fill="url(#stroke)" opacity="0.85"/>
    <rect x="60" y="112" width="620" height="34" fill="#0B1228"/>
    <circle cx="82"  cy="129" r="5" fill="#FF5F57"/>
    <circle cx="100" cy="129" r="5" fill="#FEBC2E"/>
    <circle cx="118" cy="129" r="5" fill="#28C840"/>
    <text x="370" y="133" font-size="12" fill="#6B7AA1" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" text-anchor="middle">Vault.sol</text>

    <g font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="14" fill="#C7D2FE">
      <text x="78"  y="170"><tspan fill="#6B7AA1">// SPDX-License-Identifier: MIT</tspan></text>
      <text x="78"  y="190"><tspan fill="#F472B6">pragma</tspan><tspan fill="#C7D2FE"> solidity </tspan><tspan fill="#A7F3D0">0.8.34</tspan><tspan fill="#C7D2FE">;</tspan></text>
      <text x="78"  y="222"><tspan fill="#F472B6">import</tspan><tspan fill="#C7D2FE"> {</tspan><tspan fill="#93C5FD">Ownable</tspan><tspan fill="#C7D2FE">} </tspan><tspan fill="#F472B6">from</tspan><tspan fill="#A7F3D0"> "@openzeppelin/contracts/access/Ownable.sol"</tspan><tspan fill="#C7D2FE">;</tspan></text>
      <text x="78"  y="254"><tspan fill="#F472B6">error</tspan><tspan fill="#FDE68A"> InsufficientFunds</tspan><tspan fill="#C7D2FE">(</tspan><tspan fill="#93C5FD">uint256</tspan><tspan fill="#C7D2FE"> requested, </tspan><tspan fill="#93C5FD">uint256</tspan><tspan fill="#C7D2FE"> available);</tspan></text>
      <text x="78"  y="286"><tspan fill="#F472B6">contract</tspan><tspan fill="#FDE68A"> Vault</tspan><tspan fill="#C7D2FE"> </tspan><tspan fill="#F472B6">is</tspan><tspan fill="#93C5FD"> Ownable</tspan><tspan fill="#C7D2FE"> {</tspan></text>
      <text x="96"  y="310"><tspan fill="#F472B6">function</tspan><tspan fill="#93C5FD"> withdraw</tspan><tspan fill="#C7D2FE">(</tspan><tspan fill="#93C5FD">uint256</tspan><tspan fill="#C7D2FE"> amount) </tspan><tspan fill="#F472B6">external</tspan><tspan fill="#C7D2FE"> onlyOwner {</tspan></text>
      <text x="114" y="332"><tspan fill="#F472B6">require</tspan><tspan fill="#C7D2FE">(amount &lt;= balance, </tspan><tspan fill="#FDE68A">InsufficientFunds</tspan><tspan fill="#C7D2FE">(amount, balance));</tspan><tspan fill="#22D3EE">▍<animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></tspan></text>
    </g>
  </g>

  <!-- Right: diamond with orbital rings and glow -->
  <g transform="translate(1040,210)">
    <!-- Glow pulse -->
    <circle r="170" fill="url(#glow)">
      <animate attributeName="r" values="165;185;165" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Outer dashed ring -->
    <g fill="none" stroke-linecap="round">
      <circle r="150" stroke="#6366F1" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="2 6">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="22s" repeatCount="indefinite"/>
      </circle>
      <circle r="175" stroke="#22D3EE" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="1 8">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="34s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Floating diamond -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="6s" repeatCount="indefinite"/>
      <polygon points="0,-110 -65,0 0,-30 65,0"   fill="#8B9FFF" fill-opacity="0.95"/>
      <polygon points="0,-110 65,0 0,-30"         fill="#5B73FF" fill-opacity="0.85"/>
      <polygon points="0,130 -65,10 0,-18 65,10"  fill="#C3CFFF" fill-opacity="0.95"/>
      <polygon points="0,130 65,10 0,-18"         fill="#8B9FFF" fill-opacity="0.9"/>
      <polyline points="-65,0 0,-30 65,0" fill="none" stroke="#22D3EE" stroke-opacity="0.8" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Chip row -->
  <g opacity="0" font-size="13" font-weight="600">
    <animate attributeName="opacity" from="0" to="1" begin="0.75s" dur="0.6s" fill="freeze"/>
    <g transform="translate(720,140)">
      <rect width="128" height="30" rx="15" fill="#22D3EE" fill-opacity="0.1"  stroke="#22D3EE" stroke-opacity="0.5"/>
      <text x="64" y="19" text-anchor="middle" fill="#A5F3FC">Custom errors</text>
    </g>
    <g transform="translate(858,140)">
      <rect width="148" height="30" rx="15" fill="#A78BFA" fill-opacity="0.12" stroke="#A78BFA" stroke-opacity="0.55"/>
      <text x="74" y="19" text-anchor="middle" fill="#DDD6FE">ERC-7201 storage</text>
    </g>
    <g transform="translate(720,182)">
      <rect width="148" height="30" rx="15" fill="#F472B6" fill-opacity="0.12" stroke="#F472B6" stroke-opacity="0.55"/>
      <text x="74" y="19" text-anchor="middle" fill="#FBCFE8">Transient storage</text>
    </g>
    <g transform="translate(878,182)">
      <rect width="128" height="30" rx="15" fill="#34D399" fill-opacity="0.12" stroke="#34D399" stroke-opacity="0.55"/>
      <text x="64" y="19" text-anchor="middle" fill="#A7F3D0">Foundry-first</text>
    </g>
    <g transform="translate(720,224)">
      <rect width="128" height="30" rx="15" fill="#FCD34D" fill-opacity="0.12" stroke="#FCD34D" stroke-opacity="0.55"/>
      <text x="64" y="19" text-anchor="middle" fill="#FDE68A">Solhint ready</text>
    </g>
    <g transform="translate(858,224)">
      <rect width="148" height="30" rx="15" fill="#60A5FA" fill-opacity="0.12" stroke="#60A5FA" stroke-opacity="0.55"/>
      <text x="74" y="19" text-anchor="middle" fill="#BFDBFE">Prettier · EditorConfig</text>
    </g>
  </g>

  <!-- Footer -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.95s" dur="0.6s" fill="freeze"/>
    <line x1="60" y1="382" x2="1220" y2="382" stroke="url(#stroke)" stroke-width="1" stroke-opacity="0.65"/>
    <text x="60"   y="402" font-size="13" fill="#94A3C4">Consistent · Safe · Gas-aware</text>
    <text x="1220" y="402" font-size="13" fill="#94A3C4" text-anchor="end">github.com/Aboudjem/solidity-style-guide</text>
  </g>
</svg>
