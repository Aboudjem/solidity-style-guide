name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run markdownlint
        run: npx --yes markdownlint-cli2@0.13.0 "**/*.md" "#node_modules" "#skill/references/**"

  prettier:
    name: Prettier (format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Prettier
        run: npm i --no-save prettier@3.3.3
      - name: Prettier check (md, yml, json)
        run: npx prettier --check "**/*.{md,yml,yaml,json}" "!**/node_modules/**"

  svg-validate:
    name: Validate SVG banner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: xmllint SVG
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils
          xmllint --noout assets/banner.svg
